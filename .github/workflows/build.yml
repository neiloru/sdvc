name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: .exe
            client_ldflags: "-H=windowsgui"
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            client_ldflags: ""
          - name: macos-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            ext: ""
            client_ldflags: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            client/go.sum
            server/go.sum

      - name: Install Linux GUI dependencies
        if: matrix.goos == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Build server
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -v -o "../dist/sdvc-server-${{ matrix.name }}${{ matrix.ext }}" .

      - name: Build client
        working-directory: client
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
        run: go build -v -ldflags "${{ matrix.client_ldflags }}" -o "../dist/sdvc-client-${{ matrix.name }}${{ matrix.ext }}" .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdvc-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error
